name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + syntax check ─────────────────────────────────────────
  backend:
    name: Backend lint & syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --quiet ruff

      - name: Ruff lint
        run: ruff check backend/ --output-format=github

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile backend/main.py
          python -m py_compile backend/security.py
          python -m py_compile backend/live_timing.py
          echo "All backend files parse OK"

      - name: Dockerfile lint (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error   # warn only, don't fail on style

  # ── Frontend: install + Vite build ───────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Vite build
        run: npm run build
        env:
          VITE_API_BASE: https://f1-gp-predictor.onrender.com
