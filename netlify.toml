[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_BASE = "https://f1-gp-predictor-1.onrender.com"

# SPA fallback — React Router needs this so direct links to /results/... work
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
